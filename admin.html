<!DOCTYPE html>
<html lang="en" class="scroll-smooth bg-[#050505]">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SquadUp | Master Admin Portal</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700;800;900&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --neon-cyan: #06b6d4; 
            --electric-indigo: #6366f1;
            --onyx: #020617; 
            --glass-pattern: url("data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/1999/xlink' width='100' height='100' viewBox='0 0 100 100'%3E%3Cdefs%3E%3Cfilter id='a'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3C/defs%3E%3Crect width='100' height='100' filter='url(%23a)' opacity='0.03'/%3E%3C/svg%3E");
        }
        body { font-family: 'Outfit', sans-serif; background-color: var(--onyx); color: #f8fafc; overflow-x: hidden; -webkit-font-smoothing: antialiased; }
        
        .input-luxe { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.08); color: white; border-radius: 0.75rem; padding: 1rem; width: 100%; outline: none; transition: 0.3s; color-scheme: dark; }
        .input-luxe:focus { border-color: var(--neon-cyan); background: rgba(255,255,255,0.05); box-shadow: inset 0 0 10px rgba(6, 182, 212, 0.1); }
        select option { background-color: #0f172a; color: white; }
        
        .card-luxe { background: rgba(15, 23, 42, 0.6); border: 1px solid rgba(255,255,255,0.04); border-radius: 1.5rem; position: relative; overflow: hidden; background-image: var(--glass-pattern); }
        .btn-luxe { background: linear-gradient(135deg, var(--neon-cyan), var(--electric-indigo)); color: white; font-weight: 800; border-radius: 0.75rem; transition: all 0.4s; }
        .btn-luxe:hover { transform: translateY(-3px); box-shadow: 0 0 20px rgba(6, 182, 212, 0.4); }
        .tracking-wide { letter-spacing: 0.1em; }
        .luxe-shadow { filter: drop-shadow(0 0 10px rgba(6, 182, 212, 0.6)); }
    </style>
</head>
<body class="antialiased selection:bg-cyan-500 selection:text-white flex flex-col min-h-screen">

    <div class="fixed inset-0 pointer-events-none opacity-20" style="background-image: var(--glass-pattern)"></div>

    <div class="flex-grow flex items-center justify-center p-6 relative z-10" id="login-container">
        <div class="card-luxe w-full max-w-md p-10 shadow-[0_0_50px_rgba(0,0,0,0.8)]">
            <div class="text-center mb-10">
                <h2 class="text-4xl font-black tracking-widest text-white">Squad<span class="text-cyan-400">Up</span></h2>
                <p class="text-gray-400 text-xs mt-2 font-bold uppercase tracking-widest text-red-500">Master Admin Portal</p>
            </div>
            <div class="space-y-5">
                <div>
                    <label class="text-[10px] text-gray-500 font-bold uppercase block mb-1.5 tracking-wide">Admin ID / Phone</label>
                    <input type="text" id="admin-login-id" placeholder="Enter Admin ID" class="input-luxe" onkeydown="if(event.key === 'Enter') handleAdminLogin()">
                </div>
                <div>
                    <label class="text-[10px] text-gray-500 font-bold uppercase block mb-1.5 tracking-wide">Secure Password</label>
                    <input type="password" id="admin-login-pass" placeholder="••••••••" class="input-luxe" onkeydown="if(event.key === 'Enter') handleAdminLogin()">
                </div>
                <button onclick="handleAdminLogin()" id="admin-btn-login" class="w-full py-4 bg-red-600 text-white font-bold rounded-xl hover:bg-red-700 transition shadow-[0_0_20px_rgba(220,38,38,0.4)] mt-4 uppercase text-sm tracking-widest">Access System</button>
                <div class="text-center mt-6">
                    <a href="index.html" class="text-xs text-gray-500 hover:text-white transition">← Return to Player Site</a>
                </div>
            </div>
        </div>
    </div>

    <div id="dashboard-container" class="hidden w-full max-w-[90rem] mx-auto px-6 sm:px-8 lg:px-12 py-16 relative z-10 flex-grow">
        
        <div class="flex flex-col sm:flex-row sm:items-center justify-between mb-10 border-b border-white/10 pb-6 gap-4">
            <div>
                <h2 class="text-4xl font-black text-white tracking-widest">Command Center</h2>
                <p class="text-gray-400 text-sm mt-1">Logged in as: <span id="admin-name-display" class="font-bold text-white"></span></p>
            </div>
            <button onclick="logout()" class="px-6 py-3 bg-white/5 border border-white/10 text-white text-xs font-bold uppercase tracking-widest rounded-xl hover:bg-white/10 transition">Log Out</button>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-10">
            <div class="card-luxe p-10">
                <h3 class="text-xl font-bold text-white mb-8 border-b border-white/5 pb-4 tracking-wide uppercase">Update Venue details</h3>
                <div class="space-y-5">
                    <div>
                        <label class="text-[10px] text-slate-500 font-bold uppercase mb-1.5 block tracking-wide">Select Venue</label>
                        <select id="admin-venue-select" class="input-luxe" onchange="loadAdminVenueData()"></select>
                    </div>
                    <div class="grid grid-cols-2 gap-5">
                        <div>
                            <label class="text-[10px] text-slate-500 font-bold uppercase mb-1.5 block tracking-wide">Max Players</label>
                            <input type="number" id="admin-cap" class="input-luxe">
                        </div>
                        <div>
                            <label class="text-[10px] text-slate-500 font-bold uppercase mb-1.5 block tracking-wide">Available Times</label>
                            <input type="text" id="admin-times" class="input-luxe text-sm" placeholder="e.g. 06:00 AM to 08:00 AM">
                        </div>
                    </div>
                    <button onclick="updateVenue()" id="admin-btn-update" class="w-full py-4 bg-white text-slate-900 hover:bg-slate-200 font-bold rounded-xl transition mt-4 tracking-wide uppercase text-sm">Save Changes</button>
                </div>
            </div>

            <div class="card-luxe p-10 border-cyan-500/20 shadow-[0_0_40px_rgba(6,182,212,0.15)]">
                <h3 class="text-xl font-bold text-cyan-400 luxe-shadow mb-8 border-b border-white/5 pb-4 tracking-wide uppercase">Add New Arena</h3>
                <div class="grid grid-cols-2 gap-5 mb-6">
                    <div><label class="text-[10px] text-cyan-400 font-bold uppercase block mb-1.5 tracking-wide">Sport</label><input type="text" id="new-v-sport" class="input-luxe text-sm"></div>
                    <div><label class="text-[10px] text-cyan-400 font-bold uppercase block mb-1.5 tracking-wide">Venue Name</label><input type="text" id="new-v-name" class="input-luxe text-sm"></div>
                    <div><label class="text-[10px] text-cyan-400 font-bold uppercase block mb-1.5 tracking-wide">Location</label><input type="text" id="new-v-loc" class="input-luxe text-sm"></div>
                    <div><label class="text-[10px] text-cyan-400 font-bold uppercase block mb-1.5 tracking-wide">Price/Head (₹)</label><input type="number" id="new-v-price" class="input-luxe text-sm"></div>
                    <div><label class="text-[10px] text-cyan-400 font-bold uppercase block mb-1.5 tracking-wide">Type</label><select id="new-v-type" class="input-luxe text-sm"><option value="outdoor">Outdoor</option><option value="indoor">Indoor</option></select></div>
                    <div><label class="text-[10px] text-cyan-400 font-bold uppercase block mb-1.5 tracking-wide">Status</label><select id="new-v-status" class="input-luxe text-sm"><option value="Active">Active</option><option value="Pending">Coming Soon</option></select></div>
                    <div class="col-span-2"><label class="text-[10px] text-cyan-400 font-bold uppercase block mb-1.5 tracking-wide">Image URL</label><input type="text" id="new-v-img" class="input-luxe text-sm"></div>
                </div>
                <button onclick="deployNewVenue()" id="add-venue-btn" class="w-full py-4 btn-luxe text-sm tracking-wide uppercase">Publish Arena</button>
            </div>
        </div>
    </div>

    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
    <script>
        // 🛑 REPLACE WITH YOUR GOOGLE APPS SCRIPT URL 🛑
        const scriptURL = 'https://script.google.com/macros/s/AKfycbzymgAXLSjubsooq2h3ehgSqvwurWgHWUXep-fwAn4Zun088m8gEsgAM1sDT51Uqpox/exec'; 
        
        let currentUser = null; 
        window.venues = [];

        function showToast(msg, type = 'success') {
            const bg = type === 'error' ? "linear-gradient(to right, #ef4444, #dc2626)" : "linear-gradient(to right, #06b6d4, #6366f1)";
            Toastify({
                text: msg, duration: 3000, close: true, gravity: "top", position: "center",
                style: { background: bg, borderRadius: "10px", fontWeight: "bold", fontFamily: "'Outfit', sans-serif" }
            }).showToast();
        }

        async function hashPassword(password) {
            const msgBuffer = new TextEncoder().encode(password);
            const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
        }

        async function fetchAPI(data) { 
            try {
                const response = await fetch(scriptURL, {
                    method: 'POST', headers: { 'Content-Type': 'text/plain;charset=utf-8' }, body: JSON.stringify(data)
                });
                return await response.json();
            } catch (e) {
                console.error(e);
                throw new Error("Database connection failed. Please check your internet.");
            }
        }

        document.addEventListener('DOMContentLoaded', async () => {
            const savedUser = sessionStorage.getItem('squadupAdminSession');
            if (savedUser) { 
                currentUser = JSON.parse(savedUser); 
                if (currentUser.role === 'admin') {
                    showDashboard();
                }
            }
        });

        async function handleAdminLogin() {
            const btn = document.getElementById('admin-btn-login');
            const idField = 'admin-login-id';
            const passField = 'admin-login-pass';
            const originalText = btn.innerText;
            
            btn.innerText = "Authenticating..."; btn.classList.add('opacity-50', 'cursor-wait');
            
            try {
                const rawPass = document.getElementById(passField).value;
                if(!rawPass) throw new Error("Password cannot be empty");
                const hashedPass = await hashPassword(rawPass);
                
                const res = await fetchAPI({ action: 'login', loginId: document.getElementById(idField).value, password: hashedPass });
                
                // Strictly 'admin' role only
                if(res && res.status === 'success' && res.user.role === 'admin') {
                    currentUser = res.user; 
                    sessionStorage.setItem('squadupAdminSession', JSON.stringify(currentUser));
                    showToast("Master Admin Login Successful!");
                    showDashboard();
                } else { 
                    showToast(res?.msg || "Unauthorized. Master Admin access required.", "error"); 
                    btn.innerText = originalText; btn.classList.remove('opacity-50', 'cursor-wait'); 
                }
            } catch (e) {
                showToast(e.message || "An unexpected error occurred.", "error");
                btn.innerText = originalText; btn.classList.remove('opacity-50', 'cursor-wait');
            }
        }

        function showDashboard() {
            document.getElementById('login-container').classList.add('hidden');
            document.getElementById('dashboard-container').classList.remove('hidden');
            document.getElementById('admin-name-display').innerText = currentUser.name;
            
            fetchAPI({ action: 'sync' }).then(r => { 
                if(r && r.status === 'success') { 
                    window.venues = r.venues; 
                    populateAdminSelect(); 
                } 
            });
        }

        function logout() { 
            sessionStorage.removeItem('squadupAdminSession'); 
            location.reload(); 
        }

        function populateAdminSelect() {
            const select = document.getElementById('admin-venue-select');
            if (!select) return;
            select.innerHTML = '';
            
            window.venues.forEach(function(v) { 
                select.innerHTML += `<option value="${v.name}">${v.sport} — ${v.name}</option>`;
            });
            loadAdminVenueData();
        }

        function loadAdminVenueData() {
            const name = document.getElementById('admin-venue-select').value;
            const v = window.venues.find(function(ven) { return ven.name === name; });
            if (v) { 
                document.getElementById('admin-cap').value = v.cap; 
                document.getElementById('admin-times').value = v.times || ''; 
            }
        }

        async function updateVenue() {
            const btn = document.getElementById('admin-btn-update');
            btn.innerText = 'Saving...';
            try {
                const res = await fetchAPI({ 
                    action: 'updateVenue', 
                    name: document.getElementById('admin-venue-select').value, 
                    cap: document.getElementById('admin-cap').value, 
                    times: document.getElementById('admin-times').value 
                });
                showToast((res && res.msg) || 'Venue updated successfully!', 'success');
            } catch (e) { showToast('Error: ' + e.message, 'error'); } 
            finally { btn.innerText = 'Save Changes'; }
        }

        async function deployNewVenue() {
            const btn = document.getElementById('add-venue-btn');
            btn.innerText = 'Publishing...';
            try {
                const res = await fetchAPI({ 
                    action: 'addVenue', 
                    vSport: document.getElementById('new-v-sport').value, 
                    vName: document.getElementById('new-v-name').value, 
                    vLoc: document.getElementById('new-v-loc').value, 
                    vPrice: document.getElementById('new-v-price').value, 
                    vType: document.getElementById('new-v-type').value, 
                    vStatus: document.getElementById('new-v-status').value, 
                    vImg: document.getElementById('new-v-img').value 
                });
                showToast((res && res.msg) || 'Arena published!', 'success');
            } catch (e) { showToast('Error: ' + e.message, 'error'); } 
            finally { btn.innerText = 'Publish Arena'; }
        }
    </script>
</body>
</html>
